<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Air Hockey</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #setup {
            text-align: center;
            background: #333;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        #game-container {
            display: none;
            position: relative;
        }
        canvas {
            background: #111;
            border: 5px solid #555;
            border-radius: 10px;
            cursor: none;
        }
        #status {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h1>P2P Air Hockey</h1>
        <p>同じ合言葉を入力して対戦！</p>
        <input type="text" id="room-input" placeholder="合言葉を入力 (例: myroom123)"><br>
        <button id="connect-btn">ゲーム開始</button>
        <div id="status-text"></div>
    </div>

    <div id="game-container">
        <div id="score">0 - 0</div>
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        <div id="status">接続中...</div>
    </div>

    <script>
        const setupDiv = document.getElementById('setup');
        const gameContainer = document.getElementById('game-container');
        const roomInput = document.getElementById('room-input');
        const connectBtn = document.getElementById('connect-btn');
        const statusText = document.getElementById('status-text');
        const statusDisplay = document.getElementById('status');
        const scoreDisplay = document.getElementById('score');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let peer, conn;
        let isHost = false;
        let myId, targetId;
        
        // ゲーム状態
        const ball = { x: 200, y: 300, dx: 0, dy: 0, radius: 10 };
        const p1 = { x: 200, y: 550, vx: 0, vy: 0, prevX: 200, prevY: 550, radius: 25, score: 0 }; // 自分
        const p2 = { x: 200, y: 50, vx: 0, vy: 0, prevX: 200, prevY: 50, radius: 25, score: 0 };  // 相手
        const goalWidth = 120;

        connectBtn.onclick = () => {
            const room = roomInput.value.trim();
            if (!room) return alert("合言葉を入力してください");
            
            statusText.innerText = "サーバーに接続中...";
            connectBtn.disabled = true;

            // ID生成 (合言葉-1 または 合言葉-2)
            initPeer(room);
        };

        function initPeer(room) {
            const id1 = `airhockey-${room}-1`;
            const id2 = `airhockey-${room}-2`;

            peer = new Peer(id1);

            peer.on('open', (id) => {
                isHost = true;
                statusText.innerText = "相手の接続を待っています...";
                setupDiv.style.display = 'none';
                gameContainer.style.display = 'block';
                statusDisplay.innerText = "待機中: " + room;
                initGame();
            });

            peer.on('error', (err) => {
                console.error("Peer Error:", err.type);
                // 'unavailable-id' または 'id-taken' の場合に2人目として試行
                if (err.type === 'id-taken' || err.type === 'unavailable-id') {
                    connectAsGuest(id1, id2);
                } else {
                    alert("通信エラー: " + err.type);
                    location.reload();
                }
            });

            peer.on('connection', (c) => {
                conn = c;
                setupConnection();
            });
        }

        function connectAsGuest(hostId, guestId) {
            statusText.innerText = "2人目として接続中...";
            peer = new Peer(guestId);
            
            peer.on('open', (id) => {
                isHost = false;
                conn = peer.connect(hostId);
                setupConnection();
                setupDiv.style.display = 'none';
                gameContainer.style.display = 'block';
                initGame();
            });

            peer.on('error', (err) => {
                if (err.type === 'id-taken' || err.type === 'unavailable-id') {
                    alert("この合言葉の部屋は既に満員（2名）です。");
                } else {
                    alert("ゲスト接続エラー: " + err.type);
                }
                location.reload();
            });
        }

        function setupConnection() {
            conn.on('open', () => {
                statusDisplay.innerText = "対戦相手が見つかりました！";
                if (isHost) {
                    ball.dx = (Math.random() - 0.5) * 4;
                    ball.dy = 3;
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'pos') {
                    p2.x = canvas.width - data.x;
                    p2.y = canvas.height - data.y;
                } else if (data.type === 'sync') {
                    ball.x = canvas.width - data.ball.x;
                    ball.y = canvas.height - data.ball.y;
                    p2.score = data.score.host;
                    p1.score = data.score.guest;
                    updateScore();
                }
            });
        }

        function initGame() {
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                p1.x = e.clientX - rect.left;
                p1.y = e.clientY - rect.top;

                if (p1.y < canvas.height / 2 + p1.radius) p1.y = canvas.height / 2 + p1.radius;
                if (p1.y > canvas.height - p1.radius) p1.y = canvas.height - p1.radius;
                if (p1.x < p1.radius) p1.x = p1.radius;
                if (p1.x > canvas.width - p1.radius) p1.x = canvas.width - p1.radius;

                if (conn && conn.open) {
                    conn.send({ type: 'pos', x: p1.x, y: p1.y });
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            if (!conn || !conn.open) return;

            if (isHost) {
                // パドルの速度計算（前フレームとの差分）
                p1.vx = p1.x - p1.prevX;
                p1.vy = p1.y - p1.prevY;
                p1.prevX = p1.x;
                p1.prevY = p1.y;

                p2.vx = p2.x - p2.prevX;
                p2.vy = p2.y - p2.prevY;
                p2.prevX = p2.x;
                p2.prevY = p2.y;

                // 摩擦の適用
                ball.dx *= 0.985;
                ball.dy *= 0.985;

                // 移動
                ball.x += ball.dx;
                ball.y += ball.dy;

                // 1. パドルとの衝突判定（パドルがパックを壁の外に押し出す可能性があるため、壁判定の前に実行）
                checkCollision(p1);
                checkCollision(p2);

                // 2. 壁との衝突と跳ね返り（制約としての押し戻し）
                // 左右の壁
                if (ball.x < ball.radius) {
                    ball.x = ball.radius;
                    ball.dx = Math.abs(ball.dx);
                } else if (ball.x > canvas.width - ball.radius) {
                    ball.x = canvas.width - ball.radius;
                    ball.dx = -Math.abs(ball.dx);
                }

                // 上下の壁とゴール判定
                const inGoalX = ball.x > (canvas.width - goalWidth) / 2 && ball.x < (canvas.width + goalWidth) / 2;

                if (ball.y < ball.radius) {
                    if (inGoalX) {
                        // ゴールエリア内：完全に入ったらスコア
                        if (ball.y < -ball.radius) {
                            p1.score++; resetBall();
                        }
                    } else {
                        // 通常の壁：跳ね返る
                        ball.y = ball.radius;
                        ball.dy = Math.abs(ball.dy);
                    }
                } else if (ball.y > canvas.height - ball.radius) {
                    if (inGoalX) {
                        if (ball.y > canvas.height + ball.radius) {
                            p2.score++; resetBall();
                        }
                    } else {
                        ball.y = canvas.height - ball.radius;
                        ball.dy = -Math.abs(ball.dy);
                    }
                }

                conn.send({
                    type: 'sync',
                    ball: { x: ball.x, y: ball.y },
                    score: { host: p1.score, guest: p2.score }
                });
                updateScore();
            }
        }

        function checkCollision(p) {
            const dx = ball.x - p.x;
            const dy = ball.y - p.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < ball.radius + p.radius) {
                const nx = dx / distance; // 法線ベクトル
                const ny = dy / distance;
                
                // パドルの速度を法線方向に射影（パックに向かう勢い）
                const pSpeedNormal = p.vx * nx + p.vy * ny;
                const impact = Math.max(0, pSpeedNormal);
                
                // 新しい速度 = パックの元の速度の半分 + パドルのインパクト * 係数 + 固定加算
                let speed = Math.sqrt(ball.dx * ball.dx + ball.dy * ball.dy) * 0.5 + impact * 1.2 + 2;
                
                if (speed > 20) speed = 20; // 強く振った時は少し速めに上限を設定
                if (speed < 3) speed = 3;   // 最低限の動きを維持
                
                ball.dx = nx * speed;
                ball.dy = ny * speed;
                
                // めり込み防止：パドルの外側に確実に押し出す
                const overlap = (ball.radius + p.radius) - distance;
                ball.x += nx * overlap;
                ball.y += ny * overlap;
            }
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() - 0.5) * 5;
            ball.dy = isHost ? 3 : -3;
        }

        function updateScore() {
            scoreDisplay.innerText = `${p1.score} - ${p2.score}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#555";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            ctx.strokeStyle = "#007bff";
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo((canvas.width - goalWidth) / 2, 0);
            ctx.lineTo((canvas.width + goalWidth) / 2, 0);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo((canvas.width - goalWidth) / 2, canvas.height);
            ctx.lineTo((canvas.width + goalWidth) / 2, canvas.height);
            ctx.stroke();

            ctx.fillStyle = "#ff0000";
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#007bff";
            ctx.beginPath();
            ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(p2.x, p2.y, p2.radius, 0, Math.PI * 2);
            ctx.fill();
        }
    </script>
</body>
</html>
