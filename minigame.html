<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Battle RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(51, 65, 85, 0.5); border-radius: 10px; }
        @keyframes fade-in-up {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: fade-in-up 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const iconElement = document.createElement('i');
                    iconElement.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(iconElement);
                    window.lucide.createIcons({ attrs: { class: className } });
                }
            }, [name, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`}></span>;
        };

        const INITIAL_PLAYER = {
            level: 1, exp: 0, 
            nextExp: 12,
            hp: 120, maxHp: 120,
            atk: 12, def: 6, mag: 5, mdf: 5,
            attackTimer: 0, attackSpeed: 4, skills: []
        };

        const ENEMY_TYPES = [
            { name: 'スライム', color: 'bg-green-400', move: '体当たり', moveType: 'phys', mdfMult: 0.8 },
            { name: 'ゴブリン', color: 'bg-orange-600', move: '不意打ち', moveType: 'phys', mdfMult: 1.0 },
            { name: 'ウィスプ', color: 'bg-cyan-300', move: 'マジックドレイン', moveType: 'mag', mdfMult: 2.5 },
            { name: 'ウルフ', color: 'bg-gray-500', move: '噛みつき', moveType: 'phys', mdfMult: 0.9 },
            { name: '魔法剣士', color: 'bg-blue-600', move: '魔法斬り', moveType: 'phys', mdfMult: 1.8 },
            { name: 'オーク', color: 'bg-red-800', move: '強打', moveType: 'phys', mdfMult: 0.7 },
            { name: 'スケルトン', color: 'bg-gray-300', move: 'ボーンスピア', moveType: 'mag', mdfMult: 1.3 },
            { name: 'レイス', color: 'bg-indigo-400', move: '呪い', moveType: 'mag', mdfMult: 2.8 },
            { name: 'ゴーレム', color: 'bg-stone-600', move: '岩石落とし', moveType: 'phys', mdfMult: 1.5 },
            { name: 'ガーゴイル', color: 'bg-slate-500', move: '石化の瞳', moveType: 'phys', mdfMult: 2.0 },
            { name: 'デーモン', color: 'bg-purple-700', move: 'ダーク魔法', moveType: 'mag', mdfMult: 2.2 },
            { name: 'ドラゴン', color: 'bg-red-600', move: '火炎ブレス', moveType: 'mag', mdfMult: 2.5 }
        ];

        const generateEnemy = (wave) => {
            const baseHp = 20 + wave * 12 + Math.floor(wave * wave * 0.6);
            const baseAtk = 5 + Math.floor(wave * 2.5);
            const baseDef = 2 + Math.floor(wave * 2.0);
            const baseMag = Math.floor(wave * 2.2);
            const baseMdf = Math.floor(wave * 1.8);

            if (wave > 0 && wave % 10 === 0) {
                const bossIndex = (Math.floor(wave / 10) - 1) % 4;
                const bossData = [
                    { name: '守護像 (物理壁)', color: 'bg-stone-400', type: 'def' },
                    { name: '精霊主 (魔法壁)', color: 'bg-cyan-500', type: 'mdf' },
                    { name: '狂戦士 (猛攻)', color: 'bg-red-900', type: 'atk' },
                    { name: '大魔導 (魔攻)', color: 'bg-indigo-900', type: 'mag' }
                ];
                const b = bossData[bossIndex];
                const stats = {
                    name: `【BOSS】${b.name}`, color: b.color,
                    move: 'ギガバースト', moveType: (bossIndex === 0 || bossIndex === 2) ? 'phys' : 'mag',
                    level: wave, isBoss: true,
                    maxHp: baseHp * 4,
                    atk: baseAtk, def: baseDef,
                    mag: baseMag, mdf: baseMdf,
                    expReward: (5 + wave * 4 + Math.floor(wave * wave * 0.2)) * 5,
                    attackTimer: 8, attackSpeed: 8
                };
                if (b.type === 'def') stats.def *= 3.5;
                if (b.type === 'mdf') stats.mdf *= 3.5;
                if (b.type === 'atk') stats.atk *= 2.2;
                if (b.type === 'mag') stats.mag *= 2.2;
                stats.hp = stats.maxHp;
                return stats;
            }

            const typeIndex = (wave - 1) % ENEMY_TYPES.length;
            const loop = Math.floor((wave - 1) / ENEMY_TYPES.length);
            const baseType = ENEMY_TYPES[typeIndex];
            const name = loop > 0 ? `${baseType.name} 改${loop}` : baseType.name;
            const mdfMult = baseType.mdfMult || 1.0;
            return {
                ...baseType, name, level: wave,
                maxHp: baseHp, hp: baseHp,
                atk: baseAtk, def: baseDef,
                mag: baseMag, mdf: Math.floor(baseMdf * mdfMult),
                expReward: 5 + wave * 4 + Math.floor(wave * wave * 0.2),
                attackTimer: 6, attackSpeed: 6
            };
        };

        const getCards = (wave) => {
            // 敵の成長に合わせたスケーリング係数
            // 5ウェーブごとに基本の上昇量が底上げされるイメージです
            const scale = Math.floor(wave / 5);
            const atkBonus = 4 + (wave * 2);      // WAVEごとに+2ずつ増加
            const defBonus = 4 + wave;            // WAVEごとに+1ずつ増加
            const hpBonus = 25 + (wave * 10);     // WAVEごとに+10ずつ増加
            const magBonus = 4 + (wave * 2);      // 魔法もATK同様に強化

            return [
                { id: 'hp', title: '生命の奔流', desc: `最大HP+${hpBonus} / 全回復`, type: 'stat', stat: 'maxHp', val: hpBonus, icon: 'heart', color: 'text-red-500' },
                { id: 'atk', title: '破壊の権化', desc: `物理攻撃力+${atkBonus}`, type: 'stat', stat: 'atk', val: atkBonus, icon: 'swords', color: 'text-orange-500' },
                { id: 'def', title: '金剛の構え', desc: `物理防御力+${defBonus}`, type: 'stat', stat: 'def', val: defBonus, icon: 'shield', color: 'text-blue-500' },
                { id: 'mag', title: '真理の探究', desc: `魔力+${magBonus}`, type: 'stat', stat: 'mag', val: magBonus, icon: 'wand-2', color: 'text-purple-500' },
                { id: 'mdf', title: '聖なる障壁', desc: `魔法防御力+${defBonus}`, type: 'stat', stat: 'mdf', val: defBonus, icon: 'sparkles', color: 'text-indigo-400' },
                // スキル枠（習得済みのスキルは重複しないように選別される仕組みを推奨）
                { id: 'skill_fire', title: '魔法: ファイア', desc: 'MAG依存ダメ[低/CT短]', type: 'skill', skillId: 'fireball', icon: 'zap', color: 'text-red-400' },
                { id: 'skill_heal', title: '魔法: ヒール', desc: 'MDF依存回復[CT長]', type: 'skill', skillId: 'heal', icon: 'heart', color: 'text-green-400' },
                { id: 'skill_thunder', title: '魔法: サンダー', desc: 'MAG依存高威力[CT長]', type: 'skill', skillId: 'thunder', icon: 'zap', color: 'text-yellow-400' }
            ];
        };

        function App() {
            const [gameState, setGameState] = useState({
                status: 'START', wave: 1, logs: ['ゲームスタート！'],
                cards: [], player: { ...INITIAL_PLAYER }, enemy: null, nextEnemyPreview: null
            });

            useEffect(() => {
                const timer = setInterval(() => {
                    setGameState(prev => {
                        if (prev.status !== 'PLAYING' || !prev.enemy) return prev;
                        let p = { ...prev.player, skills: [...prev.player.skills] };
                        let e = { ...prev.enemy };
                        let newLogs = [...prev.logs];
                        let status = prev.status;
                        let wave = prev.wave;
                        let cards = [...prev.cards];
                        let nextEnemyPreview = prev.nextEnemyPreview;
                        let enemyDead = false;

                        const addLog = (msg) => {
                            newLogs.unshift(msg);
                            if (newLogs.length > 50) newLogs.pop();
                        };

                        if (p.attackTimer <= 0) {
                            // 防御減衰式: ダメージ = 攻撃力 * (100 / (100 + 防御力))
                            let dmg = Math.max(1, Math.floor(p.atk * (100 / (100 + e.def))));
                            addLog(`⚔️ 攻撃！ ${e.name}に ${dmg} ダメージ！`);
                            e.hp -= dmg;

                            // --- 追加：与ダメージの10%を回復（吸血） ---
                            const lifeSteal = Math.floor(dmg * 0.1);
                            if (lifeSteal > 0) {
                                p.hp = Math.min(p.maxHp, p.hp + lifeSteal);
                                // ログがうるさくなる場合は、addLogは書かなくてもOKです
                            }
                            // --------------------------------------

                            p.attackTimer = p.attackSpeed;
                            if (e.hp <= 0) enemyDead = true;
                        }

                        if (!enemyDead) {
                            p.skills = p.skills.map(skill => {
                                if (enemyDead) return skill;
                                if (skill.timer <= 0) {
                                    if (skill.id === 'fireball') {
                                        // レベル1で1.5倍、レベル上がるごとに+0.5倍
                                        let power = 1.0 + (skill.level * 0.5); 
                                        let dmg = Math.max(1, Math.floor((p.mag * power) * (100 / (100 + e.mdf))));
                                        e.hp -= dmg;
                                        addLog(`🔥 ファイア Lv.${skill.level}！ ${e.name}に ${dmg} ダメージ！`);
                                    } else if (skill.id === 'thunder') {
                                        // レベル1で3.0倍、レベル上がるごとに+1.0倍
                                        let power = 2.0 + (skill.level * 1.0);
                                        let dmg = Math.max(1, Math.floor((p.mag * power) * (100 / (100 + (e.mdf * 0.5)))));
                                        e.hp -= dmg;
                                        addLog(`⚡ サンダー Lv.${skill.level}！ ${e.name}に ${dmg} ダメージ！`);
                                    } else if (skill.id === 'heal') {
                                        // 回復量を魔法防御（mdf）依存に変更
                                        let heal = Math.floor((p.mdf * 0.8 + 20) * (1 + (skill.level - 1) * 0.3)); 
                                        p.hp = Math.min(p.maxHp, p.hp + heal);
                                        addLog(`✨ ヒール Lv.${skill.level}！ HPが ${heal} 回復！`);
                                    }
                                    if (e.hp <= 0) enemyDead = true;
                                    return { ...skill, timer: skill.cooldown };
                                } else {
                                    return { ...skill, timer: Math.max(0, skill.timer - 1) };
                                }
                            });
                        }

                        // 敵の攻撃（スキル含む）
                        if (!enemyDead && e.attackTimer <= 0) {
                            let rawDmg = 0;
                            let moveLabel = "";
                            if (Math.random() < 0.7) {
                                rawDmg = e.atk;
                                moveLabel = `💥 ${e.name}の攻撃！`;
                                // プレイヤーの防御力で減衰
                                let finalDmg = Math.max(1, Math.floor(rawDmg * (100 / (100 + p.def))));
                                p.hp -= finalDmg;
                                addLog(`${moveLabel} ${finalDmg} ダメージ受けた！`);
                            } else {
                                // 魔法・強攻撃
                                if (e.moveType === 'mag') {
                                    rawDmg = Math.floor(e.mag * 1.5);
                                    moveLabel = `🔮 ${e.name}の${e.move}！`;
                                    let finalDmg = Math.max(1, Math.floor(rawDmg * (100 / (100 + p.mdf))));
                                    p.hp -= finalDmg;
                                    addLog(`${moveLabel} ${finalDmg} ダメージ受けた！`);
                                } else {
                                    rawDmg = Math.floor(e.atk * 1.8); // 強打の倍率をアップ
                                    moveLabel = `🌪️ ${e.name}の${e.move}！`;
                                    let finalDmg = Math.max(1, Math.floor(rawDmg * (100 / (100 + p.def * 0.7))));
                                    p.hp -= finalDmg;
                                    addLog(`${moveLabel} ${finalDmg} ダメージ受けた！`);
                                }
                            }
                            e.attackTimer = e.attackSpeed;
                            if (p.hp <= 0) status = 'GAME_OVER';
                        }

                        if (p.attackTimer > 0) p.attackTimer--;
                        if (e.attackTimer > 0) e.attackTimer--;

                        if (enemyDead) {
                            addLog(`💀 ${e.name}を撃破！ EXP +${e.expReward}`);
                            p.exp += e.expReward;
                            
                            // レベルアップまたはボス直前（9, 19... WAVEクリア時）にカード選択
                            const isPreBoss = (wave % 10 === 9);
                            if (p.exp >= p.nextExp || isPreBoss) {
                                if (p.exp >= p.nextExp) {
                                    p.level++; 
                                    p.exp -= p.nextExp;
                                    p.nextExp = Math.floor(p.nextExp * 1.2) + 10;
                                }
                                status = 'LEVEL_UP';
                                const availableCards = getCards(wave);
                                cards = availableCards.sort(() => 0.5 - Math.random()).slice(0, 3);
                                wave++;
                                e = generateEnemy(wave);
                                nextEnemyPreview = generateEnemy(wave + 1);
                            } else {
                                wave++;
                                e = generateEnemy(wave);
                                nextEnemyPreview = generateEnemy(wave + 1);
                            }
                        }

                        return { ...prev, player: p, enemy: e, logs: newLogs, status, wave, cards, nextEnemyPreview };
                    });
                }, 500);
                return () => clearInterval(timer);
            }, []);

            const startGame = () => {
                setGameState({
                    status: 'PLAYING', wave: 1, logs: ['バトル開始！'],
                    cards: [], player: { ...INITIAL_PLAYER },
                    enemy: generateEnemy(1), nextEnemyPreview: generateEnemy(2)
                });
            };

            const handleCardSelect = (card) => {
                setGameState(prev => {
                    let p = { ...prev.player };
                    // --- 追加：どのカードを選んでも最大HPの30%を回復 ---
                    const healAmount = Math.floor(p.maxHp * 0.3);
                    p.hp = Math.min(p.maxHp, p.hp + healAmount);
                    // ----------------------------------------------

                    if (card.type === 'stat') {
                        p[card.stat] += card.val;
                        if (card.stat === 'maxHp') p.hp = p.maxHp;
                        } else if (card.type === 'skill') {
                            const existingSkill = p.skills.find(s => s.id === card.skillId);
                            if (existingSkill) {
                                // すでに持っているスキルの場合はレベルを上げる
                                existingSkill.level = (existingSkill.level || 1) + 1;
                            } else if (p.skills.length < 3) {
                                // 3つ未満なら新規取得（初期レベル1）
                                const cooldownMap = { fireball: 4, heal: 16, thunder: 12 };
                                p.skills.push({ 
                                    id: card.skillId, 
                                    name: card.title.split(': ')[1], 
                                    cooldown: cooldownMap[card.skillId], 
                                    timer: 0, 
                                    icon: card.icon,
                                    color: card.color,
                                    level: 1 
                                });
                            }
                        }
                    return { ...prev, player: p, status: 'PLAYING', enemy: prev.enemy || generateEnemy(prev.wave) };
                });
            };

            const { status, player, enemy, logs, wave, cards, nextEnemyPreview } = gameState;
            const getPercent = (v, max) => Math.max(0, Math.min(100, (v / max) * 100));

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col items-center justify-center p-2 md:p-6 overflow-hidden">
                    <div className="w-full max-w-5xl h-[650px] md:h-[800px] bg-slate-900 rounded-3xl shadow-2xl border border-slate-800 overflow-hidden flex flex-col md:flex-row relative">
                        
                        {/* レベルアップ画面 */}
                        {status === 'LEVEL_UP' && (
                            <div className="absolute inset-0 z-50 flex items-center justify-center p-4">
                                <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-[2px] animate-in fade-in duration-500"></div>
                                <div className="relative w-full max-w-5xl animate-up">
                                    <div className="text-center mb-6">
                                        <h2 className="text-4xl font-black text-yellow-400 italic flex justify-center items-center gap-4 drop-shadow-[0_0_15px_rgba(250,204,21,0.4)]">
                                            <Icon name="sparkles" className="w-8 h-8" /> {wave % 10 === 0 ? 'BOSS APPROACHING!' : 'LEVEL UP!'} <Icon name="sparkles" className="w-8 h-8" />
                                        </h2>
                                    </div>
                                    <div className="flex flex-col lg:flex-row gap-4 items-stretch justify-center">
                                        <div className="w-full lg:w-72 flex flex-col gap-3">
                                            {/* プレイヤーの現在ステータス */}
                                            <div className="bg-slate-900/90 border border-slate-700 p-4 rounded-xl shadow-xl">
                                                <h3 className="text-[10px] font-black text-blue-400 mb-3 uppercase tracking-widest border-b border-slate-800 pb-2">Player Stats</h3>
                                                <div className="grid grid-cols-2 gap-2 text-[11px]">
                                                    <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">HP</span><span className="font-bold text-red-400">{player.maxHp}</span></div>
                                                    <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Atk</span><span className="font-bold text-orange-400">{player.atk}</span></div>
                                                    <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Def</span><span className="font-bold text-blue-400">{player.def}</span></div>
                                                    <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Mag</span><span className="font-bold text-purple-400">{player.mag}</span></div>
                                                    <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Res</span><span className="font-bold text-indigo-400">{player.mdf}</span></div>
                                                </div>
                                            </div>
                                            {/* 次の敵の全ステータスプレビュー */}
                                            {nextEnemyPreview && (
                                                <div className={`${nextEnemyPreview.isBoss ? 'bg-yellow-950/20 border-yellow-700/40' : 'bg-red-950/20 border-red-900/40'} border p-4 rounded-xl shadow-xl`}>
                                                    <h3 className={`text-[10px] font-black ${nextEnemyPreview.isBoss ? 'text-yellow-400 border-yellow-900/30' : 'text-red-400 border-red-900/30'} mb-3 uppercase tracking-widest border-b pb-2`}>
                                                        {nextEnemyPreview.isBoss ? 'Boss Threat Analysis' : 'Next Enemy Analysis'}
                                                    </h3>
                                                    <div className="flex items-center gap-2 mb-3">
                                                        <div className={`w-3 h-3 rounded-full ${nextEnemyPreview.color} animate-pulse`}></div>
                                                        <span className={`text-xs font-black ${nextEnemyPreview.isBoss ? 'text-yellow-400' : ''}`}>{nextEnemyPreview.name}</span>
                                                        <span className="text-[9px] ml-auto text-slate-500 font-black">WAVE {wave}</span>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-x-4 gap-y-2 text-[11px]">
                                                        <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">HP</span><span className="text-slate-300 font-bold">{nextEnemyPreview.maxHp}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Atk</span><span className="text-orange-500 font-bold">{nextEnemyPreview.atk}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Def</span><span className="text-blue-500 font-bold">{nextEnemyPreview.def}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Mag</span><span className="text-purple-500 font-bold">{nextEnemyPreview.mag}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-500 font-bold uppercase">Res</span><span className="text-indigo-400 font-bold">{nextEnemyPreview.mdf}</span></div>
                                                    </div>
                                                    <div className={`mt-3 pt-2 border-t ${nextEnemyPreview.isBoss ? 'border-yellow-900/20 text-yellow-400/70' : 'border-red-900/20 text-red-400/70'} text-[9px] font-black uppercase text-center italic tracking-widest`}>Skill: {nextEnemyPreview.move}</div>
                                                </div>
                                            )}
                                        </div>
                                        {/* カード選択 */}
                                        <div className="flex-1 flex flex-col sm:flex-row gap-3 justify-center items-center">
                                            {cards.map((card, i) => (
                                                <button key={i} onClick={() => handleCardSelect(card)} className="group bg-slate-800/60 border border-slate-700 hover:border-yellow-400 hover:bg-slate-800 p-4 rounded-xl flex flex-col items-center gap-3 w-full sm:w-44 transition-all hover:-translate-y-1 shadow-lg">
                                                    <div className={`p-3 rounded-lg bg-slate-900 shadow-inner group-hover:scale-110 transition-transform`}><Icon name={card.icon} className={`w-8 h-8 ${card.color}`} /></div>
                                                    <div className="text-center"><h3 className="font-black text-sm mb-1">{card.title}</h3><p className="text-[9px] text-slate-400 leading-tight px-1">{card.desc}</p></div>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {status === 'GAME_OVER' && (
                            <div className="absolute inset-0 bg-red-950/98 z-50 flex flex-col items-center justify-center animate-in fade-in duration-700">
                                <Icon name="skull" className="w-24 h-24 text-red-500 mb-6" />
                                <h2 className="text-5xl font-black mb-10 italic">GAME OVER</h2>
                                <button onClick={startGame} className="bg-red-600 px-12 py-4 rounded-full font-black hover:bg-red-500 transition-all shadow-lg border-b-4 border-red-800 active:translate-y-1 active:border-b-0 uppercase">Retry Abyss</button>
                            </div>
                        )}

                        <div className="flex-1 p-5 flex flex-col gap-4 relative bg-gradient-to-br from-slate-900 to-slate-800">
                            <div className="text-center bg-slate-950/50 py-1.5 rounded-full text-[10px] font-black tracking-[0.3em] border border-slate-800 uppercase text-slate-400">Battle Ground: WAVE {wave}</div>
                            
                            <div className="flex flex-col gap-5 flex-1 justify-center max-w-lg mx-auto w-full">
                                {/* プレイヤーセクション */}
                                <div className="bg-slate-800/40 p-5 rounded-2xl border border-white/5 shadow-xl">
                                    <div className="flex justify-between items-center mb-3">
                                        <div className="flex items-center gap-3">
                                            <div className="p-2 bg-blue-500/10 rounded-lg border border-blue-500/20"><Icon name="user" className="w-4 h-4 text-blue-400" /></div>
                                            <span className="font-black text-slate-100 uppercase tracking-tighter">Adventurer</span>
                                        </div>
                                        <span className="text-[10px] bg-blue-600 px-3 py-1 rounded-full font-black shadow-lg">Lv.{player.level}</span>
                                    </div>
                                    <div className="w-full bg-slate-950 h-6 rounded-lg overflow-hidden border border-slate-700 relative mb-4">
                                        <div className="bg-gradient-to-r from-green-600 to-green-400 h-full transition-all duration-500" style={{ width: `${getPercent(player.hp, player.maxHp)}%` }} />
                                        <span className="absolute inset-0 flex items-center justify-center text-[10px] font-black drop-shadow-md">{Math.ceil(player.hp)} / {player.maxHp} HP</span>
                                    </div>
                                    
                                    <div className="grid grid-cols-3 gap-3 mb-4">
                                        {player.skills.map((s, i) => (
                                            <div key={i} className="flex flex-col items-center gap-1.5">
                                                <div className="relative w-full aspect-square bg-slate-950 rounded-lg border border-slate-700 flex items-center justify-center overflow-hidden">
                                                    <Icon name={s.icon} className={`w-5 h-5 ${s.color} ${s.timer > 0 ? 'opacity-40 grayscale' : 'opacity-100'}`} />
                                                    <div className="absolute top-0 right-1 text-[8px] font-black text-yellow-500">Lv.{s.level}</div>
                                                    {s.timer > 0 && (
                                                        <>
                                                            <div className="absolute inset-0 bg-black/60 flex items-center justify-center text-[10px] font-black text-yellow-400">{Math.ceil(s.timer / 2)}s</div>
                                                            <div className="absolute bottom-0 left-0 h-1 bg-yellow-500 transition-all" style={{ width: `${getPercent(s.timer, s.cooldown)}%` }} />
                                                        </>
                                                    )}
                                                </div>
                                                <span className="text-[8px] font-black text-slate-500 uppercase truncate w-full text-center">{s.name}</span>
                                            </div>
                                        ))}
                                        {player.skills.length < 3 && Array.from({length: 3 - player.skills.length}).map((_, i) => (
                                            <div key={i} className="flex flex-col items-center gap-1.5 opacity-20">
                                                <div className="w-full aspect-square bg-slate-950/50 rounded-lg border border-dashed border-slate-700 flex items-center justify-center">
                                                    <Icon name="lock" className="w-4 h-4 text-slate-600" />
                                                </div>
                                                <span className="text-[8px] font-black text-slate-600 uppercase">Slot {player.skills.length + i + 1}</span>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-4 gap-2 text-[10px] font-black text-center">
                                        <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Atk</span><span className="text-orange-400">{player.atk}</span></div>
                                        <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Def</span><span className="text-blue-400">{player.def}</span></div>
                                        <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Mag</span><span className="text-purple-400">{player.mag}</span></div>
                                        <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Res</span><span className="text-indigo-400">{player.mdf}</span></div>
                                    </div>
                                </div>

                                <div className="flex items-center gap-4 px-4 opacity-30"><div className="h-px flex-1 bg-gradient-to-r from-transparent to-slate-400"></div><Icon name="flame" className="w-3 h-3 text-slate-400 animate-pulse" /><div className="h-px flex-1 bg-gradient-to-l from-transparent to-slate-400"></div></div>

                                {/* 敵セクション */}
                                <div className="bg-slate-800/40 p-5 rounded-2xl border border-white/5 shadow-xl relative overflow-hidden">
                                    {enemy ? (
                                        <>
                                            <div className="flex justify-between items-center mb-3">
                                                <div className="flex items-center gap-3">
                                                    <div className="p-2 bg-slate-950 rounded-lg border border-slate-800">
                                                        <Icon name={enemy.isBoss ? "crown" : "target"} className={`w-4 h-4 ${enemy.isBoss ? 'text-yellow-400' : 'text-red-500'}`} />
                                                    </div>
                                                    <span className={`font-black ${enemy.isBoss ? 'text-yellow-400' : 'text-red-300'} tracking-tight`}>{enemy.name}</span>
                                                </div>
                                                <span className={`text-[10px] ${enemy.isBoss ? 'bg-yellow-900/40 text-yellow-400 border-yellow-700/50' : 'bg-red-900/40 text-red-400 border-red-900/30'} px-3 py-1 rounded-full font-black tracking-tighter shadow-inner border`}>Lv.{enemy.level}</span>
                                            </div>
                                            <div className="w-full bg-slate-950 h-6 rounded-lg overflow-hidden border border-slate-700 relative mb-4 shadow-inner">
                                                <div className={`bg-gradient-to-r ${enemy.isBoss ? 'from-yellow-600 to-yellow-400 shadow-[0_0_15px_rgba(250,204,21,0.4)]' : 'from-red-700 to-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]'} h-full transition-all duration-300`} style={{ width: `${getPercent(enemy.hp, enemy.maxHp)}%` }} />
                                                <span className="absolute inset-0 flex items-center justify-center text-[10px] font-black drop-shadow-md tracking-tighter">{Math.max(0, Math.ceil(enemy.hp))} / {enemy.maxHp} HP</span>
                                            </div>
                                            <div className="grid grid-cols-4 gap-2 text-[10px] font-black text-center">
                                                <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Atk</span><span className="text-orange-400">{enemy.atk}</span></div>
                                                <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Def</span><span className="text-blue-400">{enemy.def}</span></div>
                                                <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Mag</span><span className="text-purple-400">{enemy.mag}</span></div>
                                                <div className="bg-slate-950/50 py-2 rounded-lg border border-slate-700/50 flex flex-col"><span className="text-[7px] text-slate-500 uppercase">Res</span><span className="text-indigo-400">{enemy.mdf}</span></div>
                                            </div>
                                        </>
                                    ) : (
                                        <div className="text-center py-10 opacity-50 flex flex-col items-center gap-4 animate-pulse"><Icon name="search" className="w-8 h-8 text-slate-600" /><span className="text-[10px] font-black uppercase tracking-widest">Searching Abyss...</span></div>
                                    )}
                                </div>
                            </div>

                            {status === 'START' && (
                                <div className="absolute inset-0 bg-slate-950 z-40 flex flex-col items-center justify-center p-8 text-center bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-900 to-slate-950">
                                    <div className="relative mb-8"><Icon name="swords" className="w-24 h-24 text-blue-500" /></div>
                                    <h1 className="text-6xl font-black mb-12 italic text-white drop-shadow-2xl tracking-tighter">AUTO QUEST</h1>
                                    <button onClick={startGame} className="bg-blue-600 px-20 py-5 rounded-full font-black text-2xl hover:scale-105 active:scale-95 shadow-[0_20px_50px_-10px_rgba(37,99,235,0.6)] border-b-4 border-blue-800 uppercase">Start Journey</button>
                                </div>
                            )}
                        </div>

                        {/* ログセクション */}
                        <div className="w-full md:w-80 bg-black/50 p-5 flex flex-col border-t md:border-t-0 md:border-l border-slate-800">
                            <div className="flex justify-between items-center mb-5 pb-3 border-b border-slate-800"><h3 className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><Icon name="activity" className="w-3 h-3 text-blue-500" /> Battle Log</h3></div>
                            <div className="flex-1 overflow-y-auto space-y-2 text-[11px] custom-scrollbar pr-3">
                                {logs.map((log, i) => (
                                    <div key={i} className={`py-1.5 border-b border-slate-800/20 leading-relaxed ${i === 0 ? 'text-white font-bold' : 'text-slate-500'}`}>{log}</div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
